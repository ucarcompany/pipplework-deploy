<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Data Pipeline — 数据管线控制台</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect rx='14' width='64' height='64' fill='url(%23g)'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-size='32' font-weight='bold' fill='white' font-family='Arial'%3E3D%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- ===== Background ===== -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- ===== Header ===== -->
    <header class="header">
        <div class="header-brand">
            <div class="logo-cube">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36">
                            <stop offset="0%" stop-color="#7c3aed"/>
                            <stop offset="100%" stop-color="#a855f7"/>
                        </linearGradient>
                    </defs>
                    <rect rx="8" width="36" height="36" fill="url(#logoGrad)"/>
                    <path d="M18 8L28 14V26L18 32L8 26V14L18 8Z" stroke="white" stroke-width="1.5" fill="none" opacity="0.9"/>
                    <path d="M18 8L18 32M8 14L28 26M28 14L8 26" stroke="white" stroke-width="1" opacity="0.4"/>
                </svg>
            </div>
            <div>
                <h1>3D Data Pipeline</h1>
                <span class="header-sub">智能数据抓取 · 自动清洗 · 实时可视化</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </div>
    </header>

    <!-- ===== Pipeline Visualisation ===== -->
    <section class="section" id="pipelineSection">
        <h2 class="section-title"><span class="tag">01</span> 管线流程</h2>
        <div class="pipeline-canvas" id="pipelineCanvas"></div>
    </section>

    <!-- ===== Control Panel ===== -->
    <section class="section" id="controlSection">
        <h2 class="section-title"><span class="tag">02</span> 爬取控制</h2>
        <div class="control-panel">
            <div class="control-group">
                <label>数据源</label>
                <select id="crawlSource">
                    <option value="printables" selected>Printables (Prusa)</option>
                    <option value="thingiverse">Thingiverse</option>
                </select>
            </div>
            <div class="control-group">
                <label>搜索关键词</label>
                <input type="text" id="crawlQuery" placeholder="留空=热门模型" autocomplete="off">
            </div>
            <div class="control-group">
                <label>数量限制</label>
                <input type="number" id="crawlLimit" value="6" min="1" max="30">
            </div>
            <div class="control-buttons">
                <button class="btn-primary" id="btnStart" onclick="startCrawl()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><polygon points="4,2 14,8 4,14"/></svg>
                    启动管线
                </button>
                <button class="btn-danger" id="btnStop" onclick="stopCrawl()" style="display:none">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="1"/></svg>
                    停止管线
                </button>
            </div>
        </div>
    </section>

    <!-- ===== Real-time Event Log ===== -->
    <section class="section" id="logSection">
        <h2 class="section-title"><span class="tag">03</span> 实时日志</h2>
        <div class="log-container" id="logContainer"></div>
    </section>

    <!-- ===== Stats Dashboard ===== -->
    <section class="section" id="statsSection">
        <h2 class="section-title"><span class="tag">04</span> 管线统计</h2>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">🔍</div>
                <div class="stat-value" id="statDiscovered">0</div>
                <div class="stat-label">发现模型</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDownloaded">0</div>
                <div class="stat-label">下载成功</div>
            </div>
            <div class="stat-card accent">
                <div class="stat-value" id="statCleaned">0</div>
                <div class="stat-label">清洗通过</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-value" id="statRejected">0</div>
                <div class="stat-label">已拒绝</div>
            </div>
        </div>
        <div class="breakdown-container" id="breakdownContainer" style="display:none">
            <h3>拒绝原因分布</h3>
            <div class="breakdown-bars" id="breakdownBars"></div>
        </div>
    </section>

    <!-- ===== Model Gallery ===== -->
    <section class="section" id="gallerySection">
        <h2 class="section-title"><span class="tag">05</span> 清洗后模型</h2>
        <div class="gallery-grid" id="galleryGrid">
            <p class="empty-hint">暂无模型，请先启动管线爬取</p>
        </div>
    </section>

    <!-- ===== Dirty Data Table ===== -->
    <section class="section" id="dirtySection">
        <h2 class="section-title"><span class="tag">06</span> 脏数据审计</h2>
        <div class="table-wrap">
            <table class="data-table" id="dirtyTable">
                <thead>
                    <tr>
                        <th>模型名</th>
                        <th>来源</th>
                        <th>拒绝类型</th>
                        <th>详细原因</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="dirtyBody">
                    <tr><td colspan="5" class="empty-hint">暂无脏数据记录</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- ===== 3D Model Viewer Modal ===== -->
    <div class="viewer-modal" id="viewerModal" style="display:none">
        <div class="viewer-header">
            <span id="viewerTitle">模型预览</span>
            <button class="btn-close" onclick="closeViewer()">✕</button>
        </div>
        <div class="viewer-canvas-wrap">
            <canvas id="viewerCanvas"></canvas>
        </div>
        <div class="viewer-info" id="viewerInfo"></div>
    </div>

    <footer class="footer">
        <span>3D Data Pipeline Demo · Built with FastAPI + Three.js + curl_cffi</span>
    </footer>

    <script src="js/pipeline-viz.js"></script>
    <script type="module" src="js/viewer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
