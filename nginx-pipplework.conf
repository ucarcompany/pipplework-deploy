# Nginx location block for 3D Data Pipeline
# Add this inside the server block for your domain
#
# Example: /etc/nginx/sites-available/yourdomain.com
# or /etc/nginx/conf.d/yourdomain.conf, add the following location block.

# --- PASTE INTO SERVER BLOCK ---

location /pipplework/ {
    proxy_pass http://127.0.0.1:9800/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
    client_max_body_size 200M;
}

# --- END ---
